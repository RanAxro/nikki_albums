name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'website/**'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y nikki_albums-macos.zip nikki_albums.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikki_albums-macos
          path: build/macos/Build/Products/Release/nikki_albums-macos.zip
