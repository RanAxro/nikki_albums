name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'website/**'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            macos/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app (arm64 only)
        run: FLUTTER_XCODE_ARCHS=arm64 flutter build macos --release

      - name: Code sign the App
        run: codesign --force --deep --sign - "build/macos/Build/Products/Release/Nikki Albums.app"

      - name: Zip the App Bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y nikki_albums-macos.zip "Nikki Albums.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikki_albums-macos
          path: build/macos/Build/Products/Release/nikki_albums-macos.zip
