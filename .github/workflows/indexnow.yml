name: IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: IndexNow Action
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: "https://nikki.ranaxro.com/sitemap.xml"
          since: 1
          since-unit: day
          endpoint: "www.bing.com"
          key: "0d383df4f2444c4eaf00f5d2931df6ef"
          key-location: "https://nikki.ranaxro.com/0d383df4f2444c4eaf00f5d2931df6ef.txt"
