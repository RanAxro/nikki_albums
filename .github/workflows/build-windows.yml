name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'website/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Download Warp-Packer
        run: |
          Invoke-WebRequest -Uri "https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe" -OutFile warp-packer.exe

      - name: Pack to Portable Executable
        run: |
          .\warp-packer.exe --arch windows-x64 --input_dir build\windows\x64\runner\Release --exec nikki_albums.exe --output "Nikki Albums.exe"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Hide Console Window
        run: editbin /subsystem:windows "Nikki Albums.exe"

      - name: Restore Executable Icon and Properties
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          .\rcedit.exe "Nikki Albums.exe" --set-icon "windows\runner\resources\app_icon.ico"
          .\rcedit.exe "Nikki Albums.exe" --set-version-string "CompanyName" "com.ranaxro.nikki"
          .\rcedit.exe "Nikki Albums.exe" --set-version-string "FileDescription" "Nikki Albums"
          .\rcedit.exe "Nikki Albums.exe" --set-version-string "ProductName" "Nikki Albums"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikki_albums-windows
          path: "Nikki Albums.exe"
