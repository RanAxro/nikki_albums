name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'website/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Pack to Portable Executable (7-Zip SFX)
        run: |
          # Download 7z extra for 7zSD.sfx
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/lzma2601.7z" -OutFile lzma.7z
          7z e lzma.7z bin/7zSD.sfx
          
          # Download rcedit
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          
          # Set icon and properties on the SFX stub BEFORE appending the archive
          .\rcedit.exe "7zSD.sfx" --set-icon "windows\runner\resources\app_icon.ico"
          .\rcedit.exe "7zSD.sfx" --set-version-string "CompanyName" "com.ranaxro.nikki"
          .\rcedit.exe "7zSD.sfx" --set-version-string "FileDescription" "Nikki Albums"
          .\rcedit.exe "7zSD.sfx" --set-version-string "ProductName" "Nikki Albums"
          
          # Create silent config without BOM
          $config = ";!@Install@!UTF-8!`r`nRunProgram=`"nikki_albums.exe`"`r`nGUIMode=`"2`"`r`n;!@InstallEnd@!`r`n"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [IO.File]::WriteAllText("config.txt", $config, $utf8NoBom)
          
          # Archive the app
          7z a app.7z .\build\windows\x64\runner\Release\*
          
          # Combine stub, config, and archive into the final executable
          cmd /c "copy /b 7zSD.sfx + config.txt + app.7z `"Nikki Albums.exe`""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikki_albums-windows
          path: "Nikki Albums.exe"
