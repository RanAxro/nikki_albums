<body>
	<div class="orb-container">
		<div class="orb orb-1"></div>
		<div class="orb orb-2"></div>
	</div>
	<div class="glow-overlay"></div>
	
	<!-- 下载卡片 -->
	<div class="download-container" id="downloadCard">
		<!-- 标题区域 -->
		<div class="header">
			<div class="logo">
				<img src="../assets/favicon.ico" alt="">
			</div>
			<h1 class="title" id="appTitle"></h1>
		</div>
		
		<!-- 下拉框选择版本 -->
		<div class="dropdown-container">
			<div class="dropdown-trigger" id="dropdownTrigger">
				<span class="dropdown-label" id="selectVersionLabel"></span>
				<div class="dropdown-value">
					<span id="currentVersion"></span>
					<div class="dropdown-arrow">
						<img src="../assets/arrow-down.svg" alt="" id="arrowDownIcon">
					</div>
				</div>
			</div>
			
			<!-- 下拉菜单 -->
			<div class="dropdown-menu" id="dropdownMenu"></div>
		</div>
		
		<!-- 可滚动内容区域 -->
		<div class="scrollable-wrapper">
			<div class="scrollable-content" id="scrollableContent">
				<div id="downloadContents"></div>
			</div>
			
			<!-- 滚动提示 -->
			<div class="scroll-hint" id="scrollHint">
				<span class="scroll-hint-text" id="scrollHintText"></span>
				<div class="scroll-hint-btn" id="scrollHintBtn" title="">
					<img src="../assets/chevron-down.svg" alt="" id="chevronDownIcon">
				</div>
			</div>
		</div>
		
		<!-- 页脚 -->
		<div class="footer" id="footerText"></div>
	</div>
	
<script src="icon.js"></script>

		<p id="macOsModalDesc"></p>
		<div class="modal-actions">
