name: nikkialbums
description: "A tool mainly used for managing your Infinity Nikki game albums."

version: 3.05.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  # ui
  easy_localization: ^3.0.8
  multi_split_view: ^3.6.1
  # util
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^10.3.7
  watcher: ^1.1.4
  super_clipboard: ^0.9.1
  desktop_drop: ^0.7.0
  url_launcher: ^6.3.2

  # algorithm
  archive: ^4.0.7
  crypto: ^3.0.7
  encrypt: ^5.0.3

  # network
  dio: ^5.9.0
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  qr_flutter: ^4.1.0
  network_info_plus: ^7.0.0
  connectivity_plus: ^7.0.0

  # Windows
  bitsdojo_window: ^0.1.6
  ffi: ^2.1.3
  win32: ^5.15.0
  win32_registry: ^2.1.0
  windows_single_instance: ^1.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/lang/
    - assets/logo/
    - assets/icon/
    - assets/icon/album/
    - assets/icon/big/
    - assets/map/
    - bin/

  shaders:
    - assets/shaders/image_fragment.frag